[adxl345]
cs_pin: sb2040:gpio1
spi_software_sclk_pin: sb2040:gpio0
spi_software_mosi_pin: sb2040:gpio3
spi_software_miso_pin: sb2040:gpio2

[resonance_tester]
accel_chip: adxl345
probe_points:
    175, 175, 20  # an example



[input_shaper]
shaper_freq_x: 57.2
shaper_type_x: mzv
shaper_freq_y: 41.8
shaper_type_y: zv

[printer]
max_accel: 3000  # should not exceed the estimated max_accel for X and Y axes